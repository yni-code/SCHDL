<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Aplikasi</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  text-align: center;
}

h1 {
  font-size: 28px;
  margin-bottom: 10px;
}

.countdown {
  font-size: 90px;
  font-weight: bold;
  letter-spacing: 2px;
  margin-bottom: 30px;
}
</style>
</head>
<body>

<div class="container">
  <h1>Aplikasi Peluncuran Artemis 3</h1>
  <div id="countdown1" class="countdown">00:00:00</div>

  <h1>Epul Amplop Coklat</h1>
  <div id="countdown2" class="countdown">00:00:00</div>
</div>

<script>
// TARGET 1
const target1 = new Date("Apr 16, 2026 23:00:00").getTime();
// TARGET 2 (ubah sesuai kebutuhan)
const target2 = new Date("Apr 30, 2026 23:00:00").getTime();

const cd1 = document.getElementById("countdown1");
const cd2 = document.getElementById("countdown2");

const interval = setInterval(() => {
  const now = new Date().getTime();

  function updateCountdown(target, element, selesaiText){
    const distance = target - now;

    if (distance < 0) {
      element.innerHTML = selesaiText;
      return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((distance / (1000 * 60)) % 60);
    const seconds = Math.floor((distance / 1000) % 60);

    element.innerHTML = 
      days + "h " +
      hours.toString().padStart(2, '0') + ":" +
      minutes.toString().padStart(2, '0') + ":" +
      seconds.toString().padStart(2, '0');
  }

  updateCountdown(target1, cd1, "Aplikasi Peluncuran Artemins 3");
  updateCountdown(target2, cd2, "Epul Amplop Coklat");

}, 1000);
</script>

</body>
</html>
