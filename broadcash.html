        <h2>BRI SUPER LEAGUE 2025/26</h2>
      </div>

      <div class="week-box">
        <label><b>WEEK</b></label>
        <select id="weekSelect"></select>
        <button onclick="exportPDF()">Export PDF</button>
      </div>
    </div>

    <div id="contentArea">
      <table>
        <thead>
          <tr>
            <th>No</th>
            <th>Home</th>
            <th>VS</th>
            <th>Away</th>
            <th>Day</th>
            <th>Date</th>
            <th>Time (WIB)</th>
            <th>Feed</th>
            <th>Live</th>
            <th>Stadium</th>
            <th>City</th>
            <th>Team</th>
            <th>PBP</th>
          </tr>
        </thead>
        <tbody id="matchTable"></tbody>
      </table>
    </div>

  </div>

  <script>
    //untuk function

    function renderTable(week) {
      const tbody = document.getElementById("matchTable");
      tbody.innerHTML = "";

      if (!matchesByWeek[week]) return;

      matchesByWeek[week].forEach(match => {

        const tr = document.createElement("tr");

        const liveKey = `live_${week}_${match.no}`;
        const feedKey = `feed_${week}_${match.no}`;
        const teamKey = `team_${week}_${match.no}`;
        const pbrKey = `pbr_${week}_${match.no}`;

        const savedLive = localStorage.getItem(liveKey) || "";
        const savedFeed = localStorage.getItem(feedKey) || "";
        const savedTeam = localStorage.getItem(teamKey) || "";
        const savedPbr = localStorage.getItem(pbrKey) || "";

        if (savedLive === "TUNDA" || savedFeed === "TUNDA") {
          tr.classList.add("TUNDA-row");
        }

        tr.innerHTML = `
      <td>${match.no}</td>
      <td>${match.home}</td>
      <td>VS</td>
      <td>${match.away}</td>
      <td>${match.day}</td>
      <td>${formatDate(match.date)}</td>
      <td>${formatTime(match.time)}</td>

      <td>
        <select class="select-feed"
          onchange="updateFeed('${feedKey}', this, this.closest('tr'))">
          <option value="">- pilih -</option>
          <option value="streaming" ${savedFeed === "streaming" ? "selected" : ""}>streaming</option>
          <option value="SNG" ${savedFeed === "SNG" ? "selected" : ""}>SNG</option>
          <option value="FTA" ${savedFeed === "FTA" ? "selected" : ""}>FTA</option>
        </select>
      </td>

      <td>
        <select class="select-live"
          onchange="updateLive('${liveKey}', this, this.closest('tr'))">
          <option value="">- pilih -</option>
          <option value="VIDEO" ${savedLive === "VIDEO" ? "selected" : ""}>VIDEO</option>
          <option value="IVM" ${savedLive === "IVM" ? "selected" : ""}>IVM</option>
          <option value="TUNDA" ${savedLive === "TUNDA" ? "selected" : ""}>TUNDA</option>
        </select>
      </td>

      <td>${match.stadium || ""}</td>
      <td>${match.city || ""}</td>
      <td>
        <select class="select-team"
          onchange="updateTeam('${teamKey}', this)">
          <option value="">- pilih -</option>
          <option value="KKB Streaming" ${savedTeam === "KKB Streaming" ? "selected" : ""}>KKB Streaming</option>
          <option value="KKB FTA" ${savedTeam === "KKB FTA" ? "selected" : ""}>KKB FTA</option>
        </select>
      </td>
      <td>
        <select class="select-pbr"
          onchange="updatePbr('${pbrKey}', this)">
          <option value="">- pilih -</option>
          <option value="KKB" ${savedPbr === "KKB" ? "selected" : ""}>KKB</option>
          <option value="IEP" ${savedPbr === "IEP" ? "selected" : ""}>IEP</option>
        </select>
      </td>
    `;

        tbody.appendChild(tr);
      });
    }

    function updateLive(key, select, row) {
      localStorage.setItem(key, select.value);
      checkTUNDA(row);
    }

    function updateFeed(key, select, row) {
      localStorage.setItem(key, select.value);
      checkTUNDA(row);
    }

    function updateTeam(key, select) {
      localStorage.setItem(key, select.value);
    }

    function updatePbr(key, select) {
      localStorage.setItem(key, select.value);
    }

    function checkTUNDA(row) {
      const liveValue = row.querySelector(".select-live")?.value;
      const feedValue = row.querySelector(".select-feed")?.value;

      if (liveValue === "TUNDA" || feedValue === "TUNDA") {
        row.classList.add("TUNDA-row");
      } else {
        row.classList.remove("TUNDA-row");
      }
    }

    let matchesByWeek = {};

    async function loadData() {
      const response = await fetch("https://script.google.com/macros/s/AKfycbw1pwYNT679thhfnENUs2EtbPbMW56MkWZjDOPPsioqC2YsWeYPV6Inx6I7zs6LKU3A/exec");
      const data = await response.json();

      // GROUPING BERDASARKAN GW
      data.forEach(match => {
        const week = match.GW;

        if (!matchesByWeek[week]) {
          matchesByWeek[week] = [];
        }

        matchesByWeek[week].push({
          no: match.NP,
          home: match.Home,
          away: match.Away,
          day: match.Day,
          date: match.Tanggal,
          time: match["Kick Off"],
          stadium: match.Venue,
          city: match.Kota,
          feed: "",
          live: "",
          team: "",
          pbr: ""
        });
      });

      renderWeekOptions();
      renderTable(1);
    }

    function renderWeekOptions() {
      const weekSelect = document.getElementById("weekSelect");
      weekSelect.innerHTML = "";

      Object.keys(matchesByWeek).forEach(week => {
        let opt = document.createElement("option");
        opt.value = week;
        opt.text = "Week " + week;
        weekSelect.appendChild(opt);
      });
    }


    function formatTime(timeString) {
      const date = new Date(timeString);

      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');

      return `${hours}:${minutes}`;
    }

    function formatDate(dateString) {
      const date = new Date(dateString);

      return date.toLocaleDateString("id-ID", {
        day: "2-digit",
        month: "long",
        year: "numeric"
      });
    }

    document.getElementById("weekSelect").addEventListener("change", function () {
      renderTable(this.value);
    });

    function exportPDF() {
      const container = document.querySelector('.container');
      const weekBox = document.querySelector('.week-box');
      const weekSelect = document.getElementById('weekSelect');
      const weekName = weekSelect.options[weekSelect.selectedIndex].text;

      // Sembunyikan bagian pengaturan saat merender PDF
      weekBox.style.display = 'none';

      // Tampilkan tulisan Gameweek sementara tepat di bawah judul tabel
      // agar tetap ikut ter-export di PDF dan terlihat jelas.
      const titleH2 = document.querySelector('.header h2');
      const weekHeaderTitle = document.createElement('span');
      weekHeaderTitle.className = 'temp-pdf-text';
      weekHeaderTitle.style.display = 'block';
      weekHeaderTitle.style.fontSize = '18px';
      weekHeaderTitle.style.marginTop = '5px';
      weekHeaderTitle.style.color = '#333';
      weekHeaderTitle.textContent = weekName;
      titleH2.appendChild(weekHeaderTitle);

      // Buat style PDF khusus. Menggunakan max-content & nowrap secara paksa 
      // memastikan tabel melebar ke ukuran aslinya dan tidak terjepit oleh batas lebar layar browser.
      // Ini 100% mencegah sisi kanan (PBP) terpotong meskipun di layar kecil.
      const exportStyle = document.createElement('style');
      exportStyle.innerHTML = `
        body { width: max-content !important; min-width: 100% !important; }
        .container { width: max-content !important; max-width: none !important; margin: 0 !important; padding: 10px !important; box-shadow: none !important; border: none !important; }
        table { font-size: 11px !important; width: max-content !important; }
        th, td { padding: 6px 8px !important; white-space: nowrap !important; }
      `;
      document.head.appendChild(exportStyle);

      // Transformasi dropdown select menjadi text biasa sementara agar terbaca sempurna oleh html2pdf
      const selects = container.querySelectorAll('select');
      selects.forEach(s => {
        s.setAttribute('data-html2canvas-ignore', 'true');
        const span = document.createElement('span');
        span.className = 'temp-pdf-text';
        span.textContent = s.options[s.selectedIndex].text !== '- pilih -' ? s.options[s.selectedIndex].text : '';
        span.style.fontWeight = 'bold';
        span.style.fontSize = '11px';
        s.parentNode.insertBefore(span, s);
      });

      const opt = {
        margin: 0.2, // Margin tipis
        filename: `Jadwal_Broadcast_${weekName.replace(' ', '_')}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, scrollX: 0, scrollY: 0 }, // Ambil dengan resolusi tinggi dari un-scrolled position
        jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
      };

      html2pdf().set(opt).from(container).save().then(() => {
        // Tampilkan kembali bagian pengaturan setelah Export selesai
        weekBox.style.display = 'flex';
        // Hapus styling PDF sementara
        document.head.removeChild(exportStyle);
        // Hapus elemen text sementara dan kembalikan elemen select
        document.querySelectorAll('.temp-pdf-text').forEach(el => el.remove());
        selects.forEach(s => s.removeAttribute('data-html2canvas-ignore'));
      });
    }

    loadData();

  </script>
</body>

</html>
